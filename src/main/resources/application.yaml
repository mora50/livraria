spring:
  application:
    name: livraria
  data:
    mongodb:
      uri: mongodb://admin:changeme@localhost:27017/app?authSource=admin
      auto-index-creation: true
    redis:
      host: localhost
      port: 6379
      password: changeme
      timeout: 60000
  cache:
    type: redis
    redis:
      time-to-live: 600000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
